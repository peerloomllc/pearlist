# App-specific configuration for the release pipeline.
# Both release.sh and ios-appstore.sh source this file.

# -- Identity -----------------------------------------------------------------
APP_NAME=PearList                           # Display name (used in logs, Nostr posts)
BUNDLE_ID=com.pearlist                       # iOS bundle ID and Android package name
ARTIFACT_PREFIX=pearlist                      # Prefix for APK/AAB filenames (e.g. pearlist-v1.0.0.apk)

# -- iOS / Xcode --------------------------------------------------------------
XCODE_WORKSPACE=ios/PearList.xcworkspace
XCODE_SCHEME=PearList
XCODE_PROJECT=ios/PearList.xcodeproj/project.pbxproj
IOS_PROVISIONING_PROFILE="PearList Distribution"

# -- Android signing -----------------------------------------------------------
KEY_ALIAS_DEFAULT=pearlist

# -- Mac Mini build host -------------------------------------------------------
MAC_MINI_REPO_PATH="peerloomllc/pearlist"

# -- Nostr announcement --------------------------------------------------------
APP_TAGLINE="Shared household lists over peer-to-peer. No account, no server."
APP_WEBSITE=https://peerloomllc.com/pearlist/
NOSTR_HASHTAGS="#PearList #Nostr #Bitcoin #P2P #lists #groceries #chores #Android #iOS #Zapstore"

# -- Screenshot automation ----------------------------------------------------
# iOS: space-separated "DeviceName|UDID" pairs (see `xcrun simctl list devices`
# on the Mac Mini). iPhone 17 Pro Max is the 6.9" App Store required size.
IOS_SCREENSHOT_DEVICES="iPhone-17-Pro-Max|BB87E9B2-1A75-4118-B03E-9FBADD5A97F4"

# Android: release APKs keep the com.pearlist applicationId (no debug suffix).
ANDROID_APP_ID="com.pearlist"
ANDROID_MAIN_ACTIVITY="com.pearlist/com.pearlist.MainActivity"
# Space-separated AVD names (see `emulator -list-avds`). Pixel_9 is an x86_64
# image (runnable on an x86_64 host); the Pixel_9_Pro AVD on this host has an
# arm/unreadable config that QEMU2 cannot boot.
ANDROID_SCREENSHOT_AVDS="Pixel_9"
